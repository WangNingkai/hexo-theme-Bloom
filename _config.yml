# ==========================================
# Bloom Theme Configuration
# ==========================================

# ---- Favicon ----
favicon: /images/favicon.ico

# ---- Navigation Menu ----
nav:
  Home: /
  About: /about/
  Articles: /archives/
  RSS: /atom.xml
  Categories: /categories/
  Links: /link

# ---- Profile / Intro ----
profile:
  enabled: true
  #avatar: /images/android-chrome-96x96.png
  title: "Ningkai Wang"
  subtitle: "Talk is cheap. Show me code."
  description: |
    王宁凯的个人技术博客，分享技术文章和学习笔记。

# ---- Homepage Columns (Core Feature) ----
# Enable categorized columns on homepage
# Max 2 columns supported
columns:
  enabled: false
  layout: two-column # single-column | two-column
  items:
    - name: Security # Display name
      category: Writeup # Category slug
      limit: 10 # Number of posts to show
      show_date: true
    - name: Note
      category: Note
      limit: 10
      show_date: true

# Fallback when columns disabled
default_list:
  title: "Recent Posts"
  limit: 10
  show_date: true

# ---- Search ----
search:
  enabled: true
  path: search.xml
  placeholder: "Search..."

# ---- Social Links ----
social:
  github: "https://github.com/wangningkai"
  twitter: ""
  email: "mailto:i@ningkai.wang"
  weibo: ""
  rss: /atom.xml

# ---- Footer ----
footer:
  copyright_since: 2018
  powered_by: true
  theme_info: true
  beian:
    - text: 苏ICP备16063755号-1
      url: https://beian.miit.gov.cn/
    - text: 苏ICP备16063755号-2
      url: https://beian.miit.gov.cn/

# ---- Appearance ----
colorscheme: dark

# ---- Layout Width ----
layout:
  page_width: 48 # 整体页面最大宽度 (rem)
  content_width: 900 # 文章内容区宽度 (px)
  mobile_padding: 12 # 移动端两侧边距 (px)

# ---- Logo ----
logo:
  enabled: true
  image: https://cdn.jsdelivr.net/gh/wangningkai/wangningkai/assets/20200820092816.png
  width: 50
  height: 50

# ---- Post Settings ----
post:
  show_updated: false
  show_wordcount: false
  show_readtime: false
  excerpt_link: "Read More"
  toc: false

# ---- Code Highlight ----
highlight:
  theme: rainbow
  copy_button: true

# ---- Comments ----
comments:
  enabled: true
  provider: "utterances" # disqus | utterances | giscus
  disqus:
    shortname: ""
  utterances:
    repo: "wangningkai/utterances-repo"
    issue_term: blog
  giscus:
    repo: ""
    repo_id: ""
    category: ""
    category_id: ""

# ---- Analytics ----
analytics:
  google: "G-0D2QZZY2MP"
  #baidu: "2e6da3c375c8a87f5b664cea6d4cb29c"

# ---- 404 Page ----
error_404:
  enabled: true
  title: "Page Not Found"
  description: "The page you're looking for doesn't exist."
